<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin Tavoli Tressette</title>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: 0 auto 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-save { background: #28a745; color: white; }
        .btn-edit { background: #ffc107; margin-bottom: 5px; }
        .btn-delete { background: #dc3545; color: white; }
        .table-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="formTitle">Crea Tavolo</h2>
    <input type="hidden" id="tableId">
    <input id="name" placeholder="Nome Tavolo">
    <input id="players" placeholder="Giocatori (es: Mario, Luca)">
    <input id="limit" type="number" value="81">
    <input id="winners" type="number" value="3">
    <input id="password" type="password" placeholder="Password per modifiche">
    <button id="mainBtn" class="btn-save" onclick="saveTable()">Salva Tavolo</button>
    <button id="cancelBtn" onclick="resetForm()" style="display:none; margin-top:5px;">Annulla</button>
</div>

<div class="card">
    <h3>Tavoli Attivi</h3>
    <div id="tables"></div>
</div>

<script>
// --- CONFIGURAZIONE FIREBASE ---
// Assicurati che questi dati siano corretti o il codice non funzionerà!
const firebaseConfig = {
    apiKey: "LA_TUA_API_KEY",
    authDomain: "IL_TUO_PROGETTO.firebaseapp.com",
    databaseURL: "https://IL_TUO_PROGETTO.firebaseio.com",
    projectId: "IL_TUO_PROGETTO",
    storageBucket: "IL_TUO_PROGETTO.appspot.com",
    messagingSenderId: "ID_MESSAGGIO",
    appId: "ID_APP"
};

// Inizializzazione
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

// --- FUNZIONI ---

function saveTable() {
    const id = document.getElementById("tableId").value || "table_" + Date.now();
    const name = document.getElementById("name").value;
    const pass = document.getElementById("password").value;

    if (!name || !pass) {
        alert("Inserisci almeno Nome e Password!");
        return;
    }

    const data = {
        name: name,
        players: document.getElementById("players").value,
        limit: Number(document.getElementById("limit").value),
        winners: Number(document.getElementById("winners").value),
        password: pass
    };

    db.ref("tables/" + id).set(data)
        .then(() => {
            alert("Tavolo salvato nel database!");
            resetForm();
        })
        .catch(err => alert("Errore: " + err.message));
}

function prepareEdit(id) {
    db.ref("tables/" + id).once("value", snap => {
        const t = snap.val();
        const inputPass = prompt("Inserisci la password del tavolo per modificare:");
        
        if (inputPass === t.password) {
            document.getElementById("tableId").value = id;
            document.getElementById("name").value = t.name;
            document.getElementById("players").value = t.players;
            document.getElementById("limit").value = t.limit;
            document.getElementById("winners").value = t.winners;
            document.getElementById("password").value = t.password;

            document.getElementById("formTitle").innerText = "Modifica Tavolo";
            document.getElementById("cancelBtn").style.display = "block";
        } else {
            alert("Password Errata!");
        }
    });
}

function deleteTable(id) {
    db.ref("tables/" + id).once("value", snap => {
        const t = snap.val();
        const inputPass = prompt("Inserisci la password per ELIMINARE il tavolo:");
        
        if (inputPass === t.password) {
            if(confirm("Eliminare definitivamente " + t.name + "?")) {
                db.ref("tables/" + id).remove();
            }
        } else {
            alert("Password Errata!");
        }
    });
}

function resetForm() {
    document.getElementById("tableId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("players").value = "";
    document.getElementById("password").value = "";
    document.getElementById("formTitle").innerText = "Crea Tavolo";
    document.getElementById("cancelBtn").style.display = "none";
}

// ASCOLTO DATI
db.ref("tables").on("value", snap => {
    const list = snap.val() || {};
    const container = document.getElementById("tables");
    container.innerHTML = "";
    for (let id in list) {
        const t = list[id];
        container.innerHTML += `
            <div class="table-item">
                <strong>${t.name}</strong> (${t.players})<br>
                <button class="btn-edit" onclick="prepareEdit('${id}')">Modifica</button>
                <button class="btn-delete" onclick="deleteTable('${id}')">Elimina</button>
            </div>`;
    }
});
</script>
</body>
</html>
