<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Torneo Tressette</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f0f2f5;
display:flex;
flex-direction:column;
align-items:center;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:420px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card" id="login">

<h3>Accesso amministratore</h3>

<input type="password" id="adminPass" placeholder="Password">

<button onclick="login()">Accedi</button>

</div>


<div class="card" id="adminPanel" style="display:none">

<h3>Crea Tavolo</h3>

<input id="name" placeholder="Nome tavolo">

<input id="players" placeholder="Giocatori (Mario,Luca,Anna)">

<input id="limit" type="number" value="81">

<input id="winners" type="number" value="3">

<input id="password" placeholder="Password tavolo">

<button onclick="createTable()">Crea Tavolo</button>

</div>


<div class="card">

<h3>Tavoli creati</h3>

<div id="tables"></div>

</div>


<script>

const ADMIN_PASSWORD="admin123"

function login(){

const p=document.getElementById("adminPass").value

if(p===ADMIN_PASSWORD){

document.getElementById("login").style.display="none"
document.getElementById("adminPanel").style.display="block"

loadTables()

}else{

alert("Password errata")

}

}


function createTable(){

const name=document.getElementById("name").value

if(!name){
alert("Inserisci nome tavolo")
return
}

const table={

name:name,
players:document.getElementById("players").value,
limit:Number(document.getElementById("limit").value),
winners:Number(document.getElementById("winners").value),
password:document.getElementById("password").value,
editor:null,
gameData:null

}

db.ref("tournament/tables/"+name).set(table)

alert("Tavolo creato")

loadTables()

}


function loadTables(){

db.ref("tournament/tables").on("value",snap=>{

const data=snap.val()

let html=""

for(let id in data){

html+=`<p><b>${data[id].name}</b> - ${data[id].players}</p>`

}

document.getElementById("tables").innerHTML=html

})

}

</script>

</body>
</html>
