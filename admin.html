<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Tavoli Tressette</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
</head>
<body>

<div class="card">
<h2>Crea Tavolo</h2>

<input id="name" value="Tavolo 1">

<label>Seleziona giocatori:</label>
<select id="players" multiple style="height:150px; width:100%;"></select>

<input id="limit" type="number" value="81">
<input id="winners" type="number" value="3">
<input id="password" placeholder="Password tavolo">

<button onclick="createTable()">Crea Tavolo</button>
</div>

<div class="card">
<h3>Tavoli creati</h3>
<div id="tables"></div>
</div>

<script>

// 🔹 Carica giocatori da Firebase
db.ref("players").on("value", snap => {
  const data = snap.val() || {};
  const select = document.getElementById("players");
  select.innerHTML = "";

  for(let id in data){
    const p = data[id];
    const option = document.createElement("option");
    option.value = p.name;
    option.textContent = p.name;
    select.appendChild(option);
  }
});

// 🔹 Creazione tavolo
function createTable(){
  const id = "table_" + Date.now();

  const select = document.getElementById("players");
  const selectedPlayers = Array.from(select.selectedOptions).map(o => o.value);

  db.ref("tables/"+id).set({
    name: document.getElementById("name").value || "Tavolo 1",
    players: selectedPlayers,
    limit: Number(document.getElementById("limit").value),
    winners: Number(document.getElementById("winners").value),
    password: document.getElementById("password").value,
    editor: null,
    game: null
  });

  alert("Tavolo creato su Firebase");
}

// 🔹 Visualizza tavoli
db.ref("tables").on("value", snap => {
  const tables = snap.val() || {};
  const div = document.getElementById("tables");
  div.innerHTML = "";

  for(let id in tables){
    const t = tables[id];

    const players = Array.isArray(t.players)
      ? t.players.join(", ")
      : t.players;

    div.innerHTML += `
      <div class="table">
        <b>${t.name}</b><br>
        Giocatori: ${players}
      </div>
    `;
  }
});

</script>

</body>
</html>
