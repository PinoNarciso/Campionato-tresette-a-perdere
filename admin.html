<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Tavoli Tressette</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<!-- Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  max-width: 500px;
}

button {
  padding: 8px;
  margin-top: 5px;
  cursor: pointer;
  width: 100%;
}

.actions {
  display: flex;
  gap: 5px;
}

.actions button {
  width: 50%;
}

.table {
  background: #fafafa;
  padding: 15px;
  margin-top: 10px;
  border-radius: 6px;
  line-height: 1.6;
}

#playersContainer {
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid #ccc;
  padding: 5px;
  border-radius: 5px;
}
</style>

</head>
<body>

<div class="card">
<h2>Crea / Modifica Tavolo</h2>

<input id="name" value="Tavolo 1" style="width:100%; margin-bottom:10px;">

<label>Carica file giocatori (.xlsx):</label>
<input type="file" id="fileInput" accept=".xlsx" style="margin-bottom:10px;">

<label>Seleziona giocatori:</label>
<div id="playersContainer" style="margin-bottom:10px;"></div>

<input id="limit" type="number" value="81" style="width:100%; margin-bottom:10px;">
<input id="winners" type="number" value="3" style="width:100%; margin-bottom:10px;">
<input id="password" placeholder="Password tavolo" style="width:100%; margin-bottom:10px;">

<button onclick="saveTable()">Salva Tavolo</button>
</div>

<div class="card">
<h3>Tavoli creati</h3>
<div id="tables"></div>
</div>

<script>
// ==================== VARIABILI GLOBALI ====================
let editingId = null;
let selectedOrder = [];
const playersContainer = document.getElementById("playersContainer");

// ==================== CARICAMENTO GIOCATORI DA EXCEL ====================
document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(evt){
    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    playersContainer.innerHTML = "";
    selectedOrder = [];

    json.forEach(row => {
      let nome = null;
      if(row.Giocatore){
        if(typeof row.Giocatore === "object" && row.Giocatore.v){
          nome = String(row.Giocatore.v);
        } else {
          nome = String(row.Giocatore);
        }
      }

      if(nome){
        const label = document.createElement("label");
        label.style.display = "block";
        label.style.padding = "3px 0";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = nome;
        checkbox.style.marginRight = "8px";

        const span = document.createElement("span");
        span.textContent = "";

        checkbox.addEventListener("change", function(){
          if(this.checked){
            selectedOrder.push(this.value);
          } else {
            selectedOrder = selectedOrder.filter(v => v !== this.value);
          }

          Array.from(playersContainer.querySelectorAll("label")).forEach(lab => {
            const cb = lab.querySelector("input");
            const idx = selectedOrder.indexOf(cb.value);
            lab.querySelector("span").textContent = idx !== -1 ? `${idx+1}. ` : "";
          });
        });

        label.appendChild(span);
        label.appendChild(checkbox);
        label.appendChild(document.createTextNode(nome));

        playersContainer.appendChild(label);
      }
    });

    alert("Giocatori caricati correttamente!");
  };

  reader.readAsArrayBuffer(file);
});

// ==================== SALVA TAVOLO ====================
function saveTable(){
  if(selectedOrder.length === 0){
    alert("Seleziona almeno un giocatore!");
    return;
  }

  const id = editingId || ("table_" + Date.now());

  db.ref("tables/"+id).set({
    name: document.getElementById("name").value || "Tavolo 1",
    players: selectedOrder.map(p => String(p)), // solo nomi
    limit: Number(document.getElementById("limit").value),
    winners: Number(document.getElementById("winners").value),
    password: document.getElementById("password").value,
    editor: null,
    game: null
  });

  editingId = null;
  selectedOrder = [];

  Array.from(playersContainer.querySelectorAll("input[type=checkbox]")).forEach(cb => {
    cb.checked = false;
    cb.previousSibling.textContent = "";
  });

  alert("Tavolo salvato correttamente!");
}

// ==================== ELIMINA TAVOLO ====================
function deleteTable(id){
  if(confirm("Vuoi eliminare questo tavolo?")){
    db.ref("tables/"+id).remove();
  }
}

// ==================== MODIFICA TAVOLO ====================
function editTable(id){
  db.ref("tables/"+id).once("value").then(snap => {
    const table = snap.val();
    if(!table) return;

    editingId = id;

    document.getElementById("name").value = table.name;
    document.getElementById("limit").value = table.limit;
    document.getElementById("winners").value = table.winners;
    document.getElementById("password").value = table.password;

    selectedOrder = table.players.slice();

    Array.from(playersContainer.querySelectorAll("label")).forEach(lab => {
      const cb = lab.querySelector("input");
      if(selectedOrder.includes(cb.value)){
        cb.checked = true;
        const idx = selectedOrder.indexOf(cb.value);
        lab.querySelector("span").textContent = `${idx+1}. `;
      } else {
        cb.checked = false;
        lab.querySelector("span").textContent = "";
      }
    });

    window.scrollTo(0,0);
  });
}

// ==================== VISUALIZZAZIONE TAVOLI ====================
db.ref("tables").on("value", snap => {
  const tables = snap.val() || {};
  const div = document.getElementById("tables");
  div.innerHTML = "";

  let tableIndex = 1;

  for(let id in tables){
    const t = tables[id];

    const playersList = Array.isArray(t.players)
      ? t.players.map((p,i) => {
          // Se è un oggetto, prendi solo il nome
          if(typeof p === "object" && p !== null){
            return `${i+1}. ${p.name || "Giocatore"}`;
          } else {
            return `${i+1}. ${String(p)}`;
          }
        }).join("<br>")
      : String(t.players);

    div.innerHTML += `
      <div class="table">
        <b>${tableIndex}. ${t.name}</b><br><br>
        ${playersList}
        <br><br>
        Limite punti: ${t.limit} | Vincitori: ${t.winners}

        <div class="actions">
          <button onclick="editTable('${id}')">✏️ Modifica</button>
          <button onclick="deleteTable('${id}')">❌ Elimina</button>
        </div>
      </div>
    `;

    tableIndex++;
  }
});

// ==================== PULIZIA VECCHI TAVOLI ====================
db.ref("tables").once("value").then(snap => {
  const tables = snap.val() || {};
  for(let id in tables){
    const t = tables[id];
    if(Array.isArray(t.players)){
      const newPlayers = t.players.map(p => {
        if(typeof p === "object" && p !== null){
          return p.name || "Giocatore";
        } else {
          return String(p);
        }
      });
      db.ref("tables/"+id+"/players").set(newPlayers);
    }
  }
});
</script>

</body>
</html>
