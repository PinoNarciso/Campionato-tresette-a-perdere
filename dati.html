<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TreSette - Monitor Dati</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #status { padding: 15px; margin-bottom: 20px; border-radius: 6px; background: #333; font-weight: bold; border-left: 5px solid #f39c12; }
        pre { background: #000; padding: 20px; border-radius: 8px; color: #00ff00; text-align: left; overflow-x: auto; font-family: 'Courier New', monospace; border: 1px solid #444; }
        .ok { border-left: 5px solid #2ecc71 !important; color: #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <h1>🃏 Dati Realtime TreSette</h1>
    <div id="status">Connessione tramite Skypack CDN...</div>
    <div id="output"></div>
</div>

<script type="module">
    // USIAMO SKYPACK: Unisce tutto in link sicuri che non danno errori CORS
    import { initializeApp } from 'https://cdn.skypack.dev';
    import { getDatabase, ref, onValue } from 'https://cdn.skypack.dev';

    const firebaseConfig = {
        apiKey: "AIzaSyAeZiPDG89tRz3QeFBhh3wWLkGtjoFGiXA",
        authDomain: "campinato-tresette-a-perdere.firebaseapp.com",
        databaseURL: "https://campinato-tresette-a-perdere-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "campinato-tresette-a-perdere",
        storageBucket: "campinato-tresette-a-perdere.firebasestorage.app",
        messagingSenderId: "105475040052",
        appId: "1:105475040052:web:631c46b7d47cd8b333bb61"
    };

    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    try {
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, '/');

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            statusEl.innerText = "✅ SISTEMA ONLINE - Dati sincronizzati";
            statusEl.className = "ok";
            outputEl.innerHTML = data 
                ? `<pre>${JSON.stringify(data, null, 4)}</pre>`
                : "Il database risponde correttamente ma non contiene dati.";
        }, (err) => {
            statusEl.innerText = "❌ Errore permessi database: " + err.message;
        });
    } catch (e) {
        statusEl.innerText = "🚨 Errore inizializzazione: " + e.message;
    }
</script>
</body>
</html>
