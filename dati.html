<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TreSette - Monitor Finale</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        #status { padding: 15px; margin-bottom: 15px; border-radius: 4px; background: #444; font-weight: bold; }
        pre { background: #000; padding: 15px; border-radius: 5px; color: #00ff00; text-align: left; overflow-x: auto; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🃏 Dati TreSette</h1>
    <div id="status">Tentativo di connessione finale...</div>
    <div id="output"></div>
</div>

<script type="module">
    // USIAMO IL BUNDLE COMPLETO: Questo evita di scaricare più file che vengono bloccati
    import { initializeApp } from "https://www.gstatic.com";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyAeZiPDG89tRz3QeFBhh3wWLkGtjoFGiXA",
        authDomain: "campinato-tresette-a-perdere.firebaseapp.com",
        databaseURL: "https://campinato-tresette-a-perdere-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "campinato-tresette-a-perdere",
        storageBucket: "campinato-tresette-a-perdere.firebasestorage.app",
        messagingSenderId: "105475040052",
        appId: "1:105475040052:web:631c46b7d47cd8b333bb61"
    };

    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    try {
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, '/');

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            statusEl.innerText = "✅ DATI RICEVUTI";
            statusEl.style.background = "#1b5e20";
            outputEl.innerHTML = data 
                ? `<pre>${JSON.stringify(data, null, 4)}</pre>`
                : "Database collegato ma vuoto.";
        }, (err) => {
            statusEl.innerText = "❌ Errore Permessi: " + err.message;
        });
    } catch (e) {
        statusEl.innerText = "🚨 Errore: " + e.message;
    }
</script>
</body>
</html>
