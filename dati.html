<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreSette - Dati Campionato</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: #e0e0e0; }
        .box { max-width: 800px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        h1 { color: #ff9800; border-bottom: 1px solid #333; padding-bottom: 10px; }
        pre { background: #000; padding: 15px; border-radius: 5px; color: #4caf50; overflow-x: auto; }
        .error { color: #f44336; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🃏 Dati TreSette (Realtime)</h1>
        <p id="status">Inizializzazione Firebase...</p>
        <div id="data-container"></div>
    </div>

    <!-- CARICAMENTO LIBRERIE FIREBASE (Versione 8.10.1) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <script>
        // Funzione che parte solo dopo che le librerie sono caricate
        window.onload = function() {
            const status = document.getElementById('status');
            
            // Verifica se Firebase è stato caricato correttamente
            if (typeof firebase === 'undefined') {
                status.innerHTML = "<span class='error'>ERRORE: Le librerie Firebase non sono state caricate. Controlla la connessione o i link.</span>";
                return;
            }

            const firebaseConfig = {
                apiKey: "AIzaSyAeZiPDG89tRz3QeFBhh3wWLkGtjoFGiXA",
                authDomain: "campinato-tresette-a-perdere.firebaseapp.com",
                databaseURL: "https://campinato-tresette-a-perdere-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "campinato-tresette-a-perdere",
                storageBucket: "campinato-tresette-a-perdere.firebasestorage.app",
                messagingSenderId: "105475040052",
                appId: "1:105475040052:web:631c46b7d47cd8b333bb61"
            };

            // Inizializza
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            
            status.innerText = "Connesso. In attesa di dati...";

            // Ascolta i cambiamenti nel database
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    status.innerText = "Dati sincronizzati correttamente:";
                    document.getElementById('data-container').innerHTML = 
                        '<pre>' + JSON.stringify(data, null, 4) + '</pre>';
                } else {
                    status.innerText = "Connesso, ma il database è VUOTO.";
                }
            }, (error) => {
                status.innerHTML = "<span class='error'>Errore Firebase: " + error.message + "</span>";
            });
        };
    </script>
</body>
</html>
</html>
