<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TreSette - Lettura Diretta</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        #status { padding: 10px; margin-bottom: 20px; border-radius: 5px; background: #333; }
        pre { background: #000; padding: 15px; color: #00ff00; text-align: left; overflow-x: auto; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>🃏 TreSette - Lettura JSON</h1>
    <div id="status">Verifica permessi...</div>
    <div id="output"></div>
</div>

<script>
    async function leggiDati() {
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        
        // NOTA: .json alla fine è OBBLIGATORIO
        const url = "https://campinato-tresette-a-perdere-default-rtdb.europe-west1.firebasedatabase.app";

        try {
            const response = await fetch(url);
            
            // Se Firebase ti rimanda alla console, significa che le Rules sono chiuse
            if (response.redirected) {
                statusEl.innerHTML = "❌ ERRORE: Accesso negato. <br><b>Devi impostare '.read': true nelle Rules di Firebase!</b>";
                return;
            }

            const data = await response.json();
            statusEl.innerText = "✅ Dati caricati con successo!";
            outputEl.innerHTML = `<pre>${JSON.stringify(data, null, 4)}</pre>`;
            
        } catch (error) {
            statusEl.innerText = "❌ Errore di connessione: " + error.message;
        }
    }

    window.onload = leggiDati;
</script>
</body>
</html>
