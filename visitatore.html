<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tressette a Perdere - Pino Narciso</title>

<style>
:root{
--primary:#2c3e50;
--danger:#e74c3c;
--warning:#f39c12;
--success:#27ae60;
--accent:#3498db;
--info:#34b7f1;
}

body{
font-family:Segoe UI;
background:#f0f2f5;
margin:0;
padding:10px;
display:flex;
flex-direction:column;
align-items:center;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:100%;
max-width:520px;
margin-bottom:15px;
}

h1{
text-align:center;
font-size:1.3rem;
color:var(--primary);
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
margin-bottom:6px;
cursor:pointer;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.btn-cap{background:var(--warning);width:auto;padding:4px 8px;font-size:0.7rem;}
.btn-rete{background:var(--info);width:auto;padding:4px 8px;font-size:0.7rem;}
.btn-undo{background:#95a5a6;}
.btn-share{background:var(--accent);}
#confirm-btn{background:var(--danger);}
#confirm-btn.ready{background:var(--success);}

.player-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px 0;
border-bottom:1px solid #eee;
}

.leader{
background:#fff3cd;
border-left:4px solid #f39c12;
}

.sum-check{
text-align:center;
font-weight:bold;
padding:6px;
border-radius:6px;
margin:10px 0;
}

.sum-ok{background:#e8f5e9;color:green;}
.sum-err{background:#ffebee;color:red;}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

th,td{
padding:6px;
font-size:0.8rem;
text-align:center;
border-bottom:1px solid #eee;
}

th:nth-child(2),td:nth-child(2){
text-align:left;
width:90px;
}

.history-scroll-cell{
display:flex;
gap:8px;
overflow-x:auto;
padding:4px 0;
}

.badge-container{
display:flex;
flex-direction:column;
align-items:center;
min-width:24px;
}

.hand-num{
display:flex;
align-items:center;
justify-content:center;
width:20px;
height:20px;
border-radius:50%;
background:#ddd;
font-size:0.7rem;
font-weight:bold;
margin-bottom:2px;
}

.badge{
padding:4px 6px;
border-radius:6px;
font-size:0.75rem;
}

.temp-winner{background:#e8f9ee;border-left:4px solid #27ae60;}
.eliminated{background:#fdf2f2;color:#aaa;text-decoration:line-through;}
.hidden{display:none}

footer{
font-size:0.7rem;
text-align:center;
color:#777;
margin:20px 0;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>

<div class="card hidden" id="game">
<h1 id="displayTableName"></h1>

<div id="inputs-area"></div>

<div id="sum-display" class="sum-check sum-err">Somma: 0 / 21</div>

<button id="confirm-btn" onclick="addRound()" disabled>Conferma Mano</button>

<h3>Classifica e storico</h3>
<table>
<thead>
<tr>
<th>N</th><th>Nome</th><th>Punti</th><th>Storico</th>
</tr>
</thead>
<tbody id="ranking-body"></tbody>
</table>

<div style="margin-top:15px">
<button class="btn-share" onclick="shareResults()">📤 Condividi risultati</button>
<button class="btn-undo" onclick="undoLast()">↩️ Annulla ultima mano</button>
</div>
</div>

<footer>© 2026 - Pino Narciso</footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "...",
  databaseURL: "...",
  projectId: "...",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players=[], history=[], limit=81, tableName="", winners=1, dealerIndex=-1;

window.onload = function(){ start(); }

function start(){
    const tableId = localStorage.getItem("tableID");
    tableName = localStorage.getItem("tableName");

    if(!tableId || !tableName){
        alert("ID o nome tavolo non trovato.");
        window.location.href = "index.html";
        return;
    }

    document.getElementById("displayTableName").innerText = tableName;
    document.getElementById("game").classList.remove("hidden");

    db.ref("tables/" + tableId).on("value", snapshot=>{
        if(snapshot.exists()){
            loadDataFromFirebase(snapshot.val());
        }
    });
}

function loadDataFromFirebase(data){
    players = [];
    if(data.players){
        players = data.players.map((p,i)=>({
            id:i,
            name:p.name || p,
            score:p.score || 0,
            active:p.active !== false,
            playerHistory:p.playerHistory || []
        }));
    }
    history = data.history || [];
    limit = data.limit || 81;
    winners = data.winners || 1;
    dealerIndex = data.dealerIndex ?? -1;

    render();
}

function render(){
    const area = document.getElementById("inputs-area");
    area.innerHTML="";

    const gameOver = isGameOver();

    players.filter(p=>p.active).forEach(p=>{
        const isDealer=(dealerIndex!=-1 && players[dealerIndex].id===p.id)?"leader":"";
        area.innerHTML+=`
        <div class="player-row ${isDealer}">
            <span>${p.name} ${isDealer?"★":""}</span>
            <div style="display:flex;gap:4px">
                <input type="number" class="score-in" data-id="${p.id}" min="0" max="21"
                style="width:50px" oninput="checkSum()" ${gameOver?"disabled":""}>
                <button class="btn-rete" onclick="fillRete(${p.id})" ${gameOver?"disabled":""}>RETE</button>
                <button class="btn-cap" onclick="makeCappotto(${p.id})" ${gameOver?"disabled":""}>CAP</button>
            </div>
        </div>`;
    });

    renderRanking();
    checkSum();

    document.getElementById("confirm-btn").disabled = gameOver;

    // 🔴 DISATTIVA TUTTI I PULSANTI TRANNE SHARE
    document.querySelectorAll("button").forEach(btn=>{
        if(!btn.classList.contains("btn-share")){
            btn.disabled = gameOver;
        }
    });
}

function isGameOver(){
    return players.filter(p=>p.active).length <= winners;
}

// 🔒 BLOCCO FUNZIONI
function addRound(){
    if(isGameOver()) return;
}

function fillRete(){
    if(isGameOver()) return;
}

function makeCappotto(){
    if(isGameOver()) return;
}

function undoLast(){
    if(isGameOver()) return;
    if(!confirm("Sei sicuro di voler annullare l'ultima mano?")) return;
}

function checkSum(){
    let sum=0;
    document.querySelectorAll(".score-in").forEach(i=>sum+=parseInt(i.value||0));

    const display=document.getElementById("sum-display");
    const btn=document.getElementById("confirm-btn");
    const gameOver = isGameOver();

    display.innerText=`Somma: ${sum} / 21`;

    if(sum==21 && !gameOver){
        btn.disabled=false;
        btn.classList.add("ready");
        display.className="sum-check sum-ok";
    } else {
        btn.disabled=true;
        btn.classList.remove("ready");
        display.className="sum-check sum-err";
    }
}
</script>

</body>
</html>
