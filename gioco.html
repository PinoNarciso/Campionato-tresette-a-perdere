<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tavoli Tressette</title>

<style>

body{
font-family:Segoe UI;
background:#f0f2f5;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:420px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
background:#3498db;
border:none;
color:white;
border-radius:6px;
}

</style>
</head>

<body>

<h2>Tavoli disponibili</h2>

<div id="tables"></div>

<script>

function loadTables(){

let tables=JSON.parse(localStorage.getItem("tables")||"[]")

const div=document.getElementById("tables")

tables.forEach((t,i)=>{

div.innerHTML+=`

<div class="card">

<b>${t.name}</b><br>
Giocatori: ${t.players}

<br><br>

<input type="password" id="pass${i}" placeholder="Password tavolo">

<button onclick="enter(${i})">Entra</button>

</div>

`

})

}

function enter(i){

let tables=JSON.parse(localStorage.getItem("tables")||"[]")

let pass=document.getElementById("pass"+i).value

if(pass===tables[i].password){

if(!localStorage.getItem("editor_"+i)){

localStorage.setItem("editor_"+i,true)
localStorage.setItem("role","editor")

}else{

localStorage.setItem("role","viewer")

}

localStorage.setItem("currentTable",JSON.stringify(tables[i]))

location.href="gioco.html"

}else{

alert("Password errata")

}

}

loadTables()

</script>

<!-- AGGIUNGI QUESTO SCRIPT ALLA FINE DEL TUO FILE GIOCO -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>

const tableId=localStorage.getItem("tableId")

if(tableId){

db.ref("tournament/tables/"+tableId+"/gameData").on("value",snap=>{

const data=snap.val()

if(data){

localStorage.setItem("tressetteGame",JSON.stringify(data))
location.reload()

}

})

}

function saveGame(){

localStorage.setItem("tressetteGame",
JSON.stringify({players,history,limit,tableName,winners,dealerIndex}))

if(tableId){

db.ref("tournament/tables/"+tableId+"/gameData")
.set({players,history,limit,tableName,winners,dealerIndex})

}

}

</script>


</body>
</html>
