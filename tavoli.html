
<!DOCTYPE html>
<html>
<head>

<title>Tavoli</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

</head>

<body>

<h2>Tavoli disponibili</h2>

<div id="tables"></div>

<script>

db.ref("tournament/tables").on("value",snap=>{

const data=snap.val()

let html=""

for(let id in data){

const t=data[id]

html+=`
<div>

<b>${t.name}</b><br>
Giocatori: ${t.players}

<br>

<input id="p_${id}" type="password" placeholder="password tavolo">

<button onclick="enter('${id}')">Entra</button>

</div>

<hr>
`

}

document.getElementById("tables").innerHTML=html

})

function enter(id){

db.ref("tournament/tables/"+id).once("value").then(s=>{

const table=s.val()

const pass=document.getElementById("p_"+id).value

if(pass!==table.password){

alert("password errata")
return

}

let role="viewer"

if(!table.editor){

db.ref("tournament/tables/"+id+"/editor").set("active")
role="editor"

}

localStorage.setItem("tableId",id)
localStorage.setItem("role",role)

location.href="gioco.html"

})

}

</script>

</body>
</html>
