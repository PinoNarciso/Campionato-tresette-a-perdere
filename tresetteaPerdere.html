<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tressette a Perdere</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
</head>
<body>

<div class="card" id="setup">
<h1>Nuovo Tavolo</h1>
<label>Nome Tavolo</label><input id="tableName" value="">
<label>Punti limite</label><input type="number" id="limit" value="81">
<label>Numero vincitori</label><input type="number" id="winners" value="3">
<label>Giocatori (separati da virgola)</label><input id="names" value="">
<button class="btn-main" onclick="start()">Inizia partita</button>
</div>

<div class="card hidden" id="game">
<h1 id="displayTableName"></h1>
<div id="inputs-area"></div>
<div id="sum-display" class="sum-check sum-err">Somma: 0 / 21</div>
<button id="confirm-btn" onclick="addRound()" disabled>Conferma Mano</button>
<h3>Classifica e storico</h3>
<table>
<thead><tr><th>N</th><th>Nome</th><th>Punti</th><th>Storico</th></tr></thead>
<tbody id="ranking-body"></tbody>
</table>
<div style="margin-top:15px">
<button class="btn-share" onclick="shareResults()">📤 Condividi risultati</button>
<button class="btn-undo" onclick="undoLast()">↩️ Annulla ultima mano</button>
<button style="background:#eee;color:#333" onclick="resetGame()">🔄 Nuova partita</button>
</div>
</div>

<footer>© 2026 - Pino Narciso</footer>

<script>
let tableID = localStorage.getItem("tableID");
let tableData;
let role = "viewer";

let players=[], history=[], limit=81, tableName="Tavolo 1", winners=1, dealerIndex=-1;

db.ref("tables/"+tableID).on("value", snap=>{
  tableData = snap.val();
  if(!tableData) return;
  document.getElementById("tableName").value = tableData.name;
  document.getElementById("limit").value = tableData.limit;
  document.getElementById("winners").value = tableData.winners;
  document.getElementById("names").value = tableData.players;
  if(!tableData.editor) requestPassword();
});

function requestPassword(){
  const pass = prompt("Inserisci password tavolo");
  if(pass===tableData.password){
    db.ref("tables/"+tableID+"/editor").set(true);
    role = "editor";
    alert("Ora puoi inserire i punteggi");
  } else {
    role = "viewer";
    alert("Accesso solo visualizzazione");
  }
}

function start(){
  if(role!=="editor") alert("Sei in modalità spettatore");

  const namesRaw = document.getElementById("names").value;
  const names = namesRaw.split(",").map(n=>n.trim()).filter(n=>n);
  if(names.length<2){ alert("Inserisci almeno 2 giocatori"); return; }

  limit = parseInt(document.getElementById("limit").value)||81;
  winners = parseInt(document.getElementById("winners").value)||1;
  tableName = document.getElementById("tableName").value;

  players = names.map((n,i)=>({id:i,name:n,score:0,active:true,playerHistory:[]}));
  dealerIndex=-1;
  document.getElementById("displayTableName").innerText = tableName;

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  saveGame();
  render();
}

// Qui vanno tutte le funzioni Tressette (render, addRound, checkSum, fillRete, makeCappotto, undoLast, renderRanking, shareResults, resetGame)
</script>

</body>
</html>
