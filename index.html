<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tavoli</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>

<body>

<h1>Seleziona Tavolo</h1>
<div id="lista"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAeZiPDG89tRz3QeFBhh3wWLkGtjoFGiXA",
  authDomain: "campinato-tresette-a-perdere.firebaseapp.com",
  databaseURL: "https://campinato-tresette-a-perdere-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "campinato-tresette-a-perdere",
  storageBucket: "campinato-tresette-a-perdere.firebasestorage.app",
  messagingSenderId: "105475040052",
  appId: "1:105475040052:web:631c46b7d47cd8b333bb61"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("tavoli").on("value", snap=>{
  const dati = snap.val() || {};
  lista.innerHTML="";

  for(let id in dati){
    lista.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px;">
        <h3>${dati[id].nome}</h3>
        <p>${dati[id].giocatori.join(", ")}</p>
        <button onclick="entra('${id}')">Entra</button>
      </div>
    `;
  }
});

function entra(id){
  window.location.href = "tressetteaPerdere.html?id="+id;
}
</script>

</body>
</html>
